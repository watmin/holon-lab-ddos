<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>http-lab WAF Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Consolas', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }

        #container {
            display: grid;
            grid-template-rows: 54px 1fr 1fr auto 1fr;
            grid-template-columns: 1fr 1fr;
            width: 100vw;
            height: 100vh;
            gap: 4px;
            padding: 4px;
        }

        /* ── Header ─────────────────────────────────────── */
        #header {
            grid-column: 1 / -1;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #header-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        #header-title {
            font-size: 17px;
            font-weight: bold;
            color: #8af;
        }
        #status {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.connected {
            background: #4f4;
            box-shadow: 0 0 8px #4f4;
        }
        #stats-summary {
            display: flex;
            gap: 18px;
            font-size: 13px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 15px;
            font-weight: bold;
        }

        /* ── Charts ─────────────────────────────────────── */
        .chart-panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        #chart-enforcement { grid-column: 1 / -1; }
        #chart-detection   { grid-column: 1 / -1; }
        .chart-wrap {
            width: 100%;
            height: 100%;
        }

        /* ── Side panels ────────────────────────────────── */
        .panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .panel-header {
            background: #181818;
            padding: 8px 14px;
            border-bottom: 1px solid #333;
            font-size: 11px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        /* ── Detection panel ────────────────────────────── */
        #detection-panel { grid-column: 1 / -1; }
        #detection-body {
            overflow-y: hidden;
            padding: 6px 8px;
        }
        .det-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
            height: 100%;
        }
        .det-col {
            border-right: 1px solid #222;
            padding: 0 10px;
        }
        .det-col:last-child { border-right: none; }
        .det-col:first-child { padding-left: 4px; }
        .det-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            font-size: 11px;
        }
        .det-row.alert {
            background: rgba(255, 80, 80, 0.12);
            border-radius: 3px;
            padding: 2px 4px;
        }
        .det-label { color: #888; }
        .det-val { font-weight: bold; }
        .det-ok { color: #6c6; }
        .det-alert { color: #f66; }
        .det-section-title {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 2px;
            font-weight: bold;
        }

        /* ── Active rules panel ─────────────────────────── */
        .rule-item {
            padding: 6px 8px;
            margin-bottom: 4px;
            background: #1a1a1a;
            border-left: 3px solid #4af;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Consolas', monospace;
            word-break: break-all;
        }
        .rule-item .rule-action {
            color: #fa4;
            font-size: 10px;
        }
        .rule-item .rule-age {
            color: #666;
            font-size: 10px;
            float: right;
        }

        /* ── Event log ──────────────────────────────────── */
        #event-log .panel-body {
            display: flex;
            flex-direction: column;
        }

        .event-entry {
            padding: 5px 10px;
            margin-bottom: 3px;
            background: #1a1a1a;
            border-left: 3px solid;
            border-radius: 3px;
            font-size: 11px;
            font-family: 'Consolas', monospace;
        }
        .event-entry.rule_added      { border-left-color: #f84; }
        .event-entry.rule_expired     { border-left-color: #888; opacity: 0.7; }
        .event-entry.engram_deployed  { border-left-color: #bf4; }
        .event-entry.anomaly_confirmed { border-left-color: #f44; }
        .event-entry.engram_hit       { border-left-color: #4f4; }
        .event-entry.engram_minted    { border-left-color: #4af; }
        .event-entry.attack_ended     { border-left-color: #888; }

        .event-time { color: #666; margin-right: 8px; }
        .event-tag  { font-weight: bold; text-transform: uppercase; margin-right: 6px; }

        .no-data-msg {
            color: #555;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="container">
        <!-- Header -->
        <div id="header">
            <div id="header-left">
                <div id="header-title">http-lab WAF Dashboard</div>
                <div id="status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
            <div id="stats-summary">
                <div class="stat-item">
                    <div class="stat-label">Total</div>
                    <div class="stat-value" id="s-total">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Pass</div>
                    <div class="stat-value" id="s-pass" style="color:#4af;">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Rate-Ltd</div>
                    <div class="stat-value" id="s-rate-ltd" style="color:#fa4;">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Blocked</div>
                    <div class="stat-value" id="s-blocked" style="color:#f44;">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">RPS</div>
                    <div class="stat-value" id="s-rps">0</div>
                </div>
            </div>
        </div>

        <!-- Chart 1: Enforcement rates -->
        <div class="chart-panel" id="chart-enforcement">
            <div class="chart-wrap" id="chart-enforcement-wrap"></div>
        </div>

        <!-- Chart 2: Detection scores -->
        <div class="chart-panel" id="chart-detection">
            <div class="chart-wrap" id="chart-detection-wrap"></div>
        </div>

        <!-- Detection state panel -->
        <div class="panel" id="detection-panel">
            <div class="panel-header">Detection State</div>
            <div class="panel-body" id="detection-body">
                <div class="no-data-msg">Waiting for data...</div>
            </div>
        </div>

        <!-- Active rules panel -->
        <div class="panel" id="rules-panel">
            <div class="panel-header">
                <span>Active Rules</span>
                <span id="rules-count" style="color:#4af;">0</span>
            </div>
            <div class="panel-body" id="rules-body">
                <div class="no-data-msg">No rules active</div>
            </div>
        </div>

        <!-- Event log -->
        <div class="panel" id="event-log">
            <div class="panel-header">Event Log</div>
            <div class="panel-body" id="event-log-body">
                <div class="no-data-msg">No events yet</div>
            </div>
        </div>
    </div>

    <script>
    // =========================================================================
    // State
    // =========================================================================
    const WINDOW_SECS = 120;
    const state = {
        connected: false,
        ts: [],
        passRate: [], rateLtdRate: [], blockRate: [],
        tlsScore: [], tlsThr: [], reqScore: [], reqThr: [],
        lastMetrics: null,
        events: [],
        latestDetection: null,
    };

    let enfChart = null, detChart = null;

    // =========================================================================
    // SSE
    // =========================================================================
    let es = null;
    function connectSSE() {
        if (es) es.close();
        es = new EventSource('/api/metrics/events');
        es.onopen = () => { state.connected = true; updateStatus(); };
        es.onerror = () => {
            state.connected = false;
            updateStatus();
            setTimeout(connectSSE, 3000);
        };
        es.onmessage = (e) => {
            try { handleEvent(JSON.parse(e.data)); }
            catch (err) { console.error('SSE parse error:', err); }
        };
    }

    function handleEvent(d) {
        switch (d.type) {
            case 'metrics': handleMetrics(d); break;
            case 'rule_event': addEvent('rule', d); break;
            case 'detection_event': addEvent('detection', d); break;
            case 'heartbeat': break;
        }
    }

    // =========================================================================
    // Metrics handler
    // =========================================================================
    function handleMetrics(d) {
        const now = Date.now() / 1000;
        let passR = 0, rlR = 0, blkR = 0;

        if (state.lastMetrics) {
            const dt = Math.max(d.ts - state.lastMetrics.ts, 0.01);
            passR = Math.max(0, (d.enforced_pass - state.lastMetrics.enforced_pass) / dt);
            rlR   = Math.max(0, (d.enforced_rate_limits - state.lastMetrics.enforced_rate_limits) / dt);
            blkR  = Math.max(0, (d.enforced_blocks - state.lastMetrics.enforced_blocks) / dt);
        }
        state.lastMetrics = d;
        state.latestDetection = d;

        state.ts.push(now);
        state.passRate.push(passR);
        state.rateLtdRate.push(rlR);
        state.blockRate.push(blkR);
        state.tlsScore.push(d.tls_score);
        state.tlsThr.push(d.tls_threshold);
        state.reqScore.push(d.req_score);
        state.reqThr.push(d.req_threshold);
        trimTimeline();

        updateEnfChart();
        updateDetChart();
        updateHeader(d, passR + rlR + blkR);
        updateDetectionPanel(d);
    }

    function trimTimeline() {
        const cutoff = Date.now() / 1000 - WINDOW_SECS;
        while (state.ts.length > 0 && state.ts[0] < cutoff) {
            state.ts.shift();
            state.passRate.shift();
            state.rateLtdRate.shift();
            state.blockRate.shift();
            state.tlsScore.shift();
            state.tlsThr.shift();
            state.reqScore.shift();
            state.reqThr.shift();
        }
    }

    // =========================================================================
    // Header
    // =========================================================================
    function updateHeader(d, totalRate) {
        const total = d.enforced_pass + d.enforced_rate_limits + d.enforced_blocks + d.enforced_close_conn;
        el('s-total').textContent = fmt(total);
        el('s-pass').textContent = fmt(d.enforced_pass);
        el('s-rate-ltd').textContent = fmt(d.enforced_rate_limits);
        el('s-blocked').textContent = fmt(d.enforced_blocks);
        el('s-rps').textContent = fmt(Math.round(d.estimated_rps));
    }

    function updateStatus() {
        const dot = el('status-dot');
        const txt = el('status-text');
        if (state.connected) {
            dot.classList.add('connected');
            txt.textContent = 'Connected';
        } else {
            dot.classList.remove('connected');
            txt.textContent = 'Disconnected';
        }
    }

    // =========================================================================
    // Chart 1: Enforcement rates
    // =========================================================================
    function initEnfChart() {
        const wrap = el('chart-enforcement-wrap');
        const r = wrap.getBoundingClientRect();
        const opts = {
            title: "Enforcement Rates (/s)",
            width: r.width, height: r.height,
            pxAlign: false,
            scales: {
                x: { time: true, range: () => { const n = Date.now()/1000; return [n-120, n]; } },
                y: { range: (_, __, mx) => [0, Math.max((mx||1)*1.1, 1)] },
            },
            axes: [
                { stroke:"#666", grid:{show:true,stroke:"#1a1a1a",width:1}, font:"10px monospace" },
                { stroke:"#666", grid:{show:true,stroke:"#1a1a1a",width:1}, font:"10px monospace",
                  values:(_,t)=>t.map(v=>fmt(Math.round(v))+'/s'), size:60 },
            ],
            series: [
                {},
                { label:"Pass",       stroke:"#4af", fill:"rgba(68,170,255,0.08)", width:2 },
                { label:"Rate-Ltd",   stroke:"#fa4", fill:"rgba(255,170,68,0.08)", width:2 },
                { label:"Blocked",    stroke:"#f44", fill:"rgba(255,68,68,0.08)",  width:2 },
            ],
            cursor: { drag:{x:false,y:false} },
            legend: { show: false },
        };
        enfChart = new uPlot(opts, [[],[],[],[]], wrap);
    }

    function updateEnfChart() {
        if (!enfChart || state.ts.length === 0) return;
        enfChart.setData([state.ts, state.passRate, state.rateLtdRate, state.blockRate]);
    }

    // =========================================================================
    // Chart 2: Detection scores vs thresholds
    // =========================================================================
    function initDetChart() {
        const wrap = el('chart-detection-wrap');
        const r = wrap.getBoundingClientRect();
        const opts = {
            title: "Detection Scores vs Thresholds",
            width: r.width, height: r.height,
            pxAlign: false,
            scales: {
                x: { time: true, range: () => { const n = Date.now()/1000; return [n-120, n]; } },
                y: { range: (_, __, mx) => [0, Math.max((mx||1)*1.1, 1)] },
            },
            axes: [
                { stroke:"#666", grid:{show:true,stroke:"#1a1a1a",width:1}, font:"10px monospace" },
                { stroke:"#666", grid:{show:true,stroke:"#1a1a1a",width:1}, font:"10px monospace",
                  values:(_,t)=>t.map(v=>v.toFixed(1)), size:50 },
            ],
            series: [
                {},
                { label:"TLS score", stroke:"#0ff",            width:2 },
                { label:"TLS thr",   stroke:"#0ff", dash:[4,4], width:1 },
                { label:"REQ score", stroke:"#ff0",            width:2 },
                { label:"REQ thr",   stroke:"#ff0", dash:[4,4], width:1 },
            ],
            cursor: { drag:{x:false,y:false} },
            legend: { show: false },
        };
        detChart = new uPlot(opts, [[],[],[],[],[]], wrap);
    }

    function updateDetChart() {
        if (!detChart || state.ts.length === 0) return;
        detChart.setData([state.ts, state.tlsScore, state.tlsThr, state.reqScore, state.reqThr]);
    }

    // =========================================================================
    // Detection panel
    // =========================================================================
    function updateDetectionPanel(d) {
        const body = el('detection-body');
        const tlsAnomaly = d.tls_score > d.tls_threshold && d.tls_threshold > 0;
        const reqAnomaly = d.req_score > d.req_threshold && d.req_threshold > 0;
        body.innerHTML = `
            <div class="det-grid">
                <div class="det-col">
                    <div class="det-section-title">TLS Detector</div>
                    <div class="det-row ${tlsAnomaly ? 'alert' : ''}">
                        <span class="det-label">Score</span>
                        <span class="det-val">${d.tls_score.toFixed(2)}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Threshold</span>
                        <span class="det-val">${d.tls_threshold.toFixed(2)}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Status</span>
                        <span class="det-val ${tlsAnomaly ? 'det-alert' : 'det-ok'}">${tlsAnomaly ? 'ALERT' : 'ok'}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Streak</span>
                        <span class="det-val">${d.anomaly_streak_tls}</span>
                    </div>
                </div>
                <div class="det-col">
                    <div class="det-section-title">REQ Detector</div>
                    <div class="det-row ${reqAnomaly ? 'alert' : ''}">
                        <span class="det-label">Score</span>
                        <span class="det-val">${d.req_score.toFixed(2)}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Threshold</span>
                        <span class="det-val">${d.req_threshold.toFixed(2)}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Status</span>
                        <span class="det-val ${reqAnomaly ? 'det-alert' : 'det-ok'}">${reqAnomaly ? 'ALERT' : 'ok'}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Streak</span>
                        <span class="det-val">${d.anomaly_streak_req}</span>
                    </div>
                </div>
                <div class="det-col">
                    <div class="det-section-title">System</div>
                    <div class="det-row">
                        <span class="det-label">Engrams</span>
                        <span class="det-val">T=${d.engrams_tls} R=${d.engrams_req}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Warmup</span>
                        <span class="det-val">T=${d.warmup_tls ? '...' : 'ok'} R=${d.warmup_req ? '...' : 'ok'}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Rules</span>
                        <span class="det-val">${d.active_rules}</span>
                    </div>
                    <div class="det-row">
                        <span class="det-label">Tick</span>
                        <span class="det-val">${d.tick_count}</span>
                    </div>
                </div>
            </div>`;
    }

    // =========================================================================
    // Active rules (polled from /api/rules every 2s)
    // =========================================================================
    function fetchRules() {
        fetch('/api/rules')
            .then(r => r.json())
            .then(rules => {
                el('rules-count').textContent = rules.length;
                const body = el('rules-body');
                if (rules.length === 0) {
                    body.innerHTML = '<div class="no-data-msg">No rules active</div>';
                    return;
                }
                body.innerHTML = rules.map(r => `
                    <div class="rule-item">
                        <span class="rule-age">${r.age_secs.toFixed(0)}s ago</span>
                        <div>${escHtml(r.edn)}</div>
                        <div class="rule-action">${escHtml(r.action)}</div>
                    </div>`).join('');
            })
            .catch(() => {});
    }
    setInterval(fetchRules, 2000);

    // =========================================================================
    // Event log
    // =========================================================================
    function addEvent(category, d) {
        let css, tag, detail;
        if (category === 'rule') {
            css = d.action === 'added' ? 'rule_added'
                : d.action === 'expired' ? 'rule_expired'
                : 'engram_deployed';
            tag = d.action === 'added' ? 'RULE ADDED'
                : d.action === 'expired' ? 'RULE EXPIRED'
                : 'ENGRAM DEPLOY';
            detail = d.summary;
        } else {
            css = d.kind;
            tag = d.kind.replace(/_/g, ' ').toUpperCase();
            detail = `[${d.detector}] ${d.detail}`;
        }
        state.events.unshift({ ts: d.ts, css, tag, detail });
        if (state.events.length > 200) state.events.pop();
        renderEventLog();
    }

    function renderEventLog() {
        const body = el('event-log-body');
        body.innerHTML = state.events.map(e => `
            <div class="event-entry ${e.css}">
                <span class="event-time">${fmtTime(e.ts)}</span>
                <span class="event-tag">${e.tag}</span>
                <span>${escHtml(e.detail)}</span>
            </div>`).join('');
    }

    // =========================================================================
    // Utilities
    // =========================================================================
    function el(id) { return document.getElementById(id); }
    function fmt(n) {
        if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
        if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
        return String(n);
    }
    function fmtTime(ts) {
        return new Date(ts * 1000).toLocaleTimeString();
    }
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // =========================================================================
    // Resize
    // =========================================================================
    function onResize() {
        if (enfChart) {
            const r = el('chart-enforcement-wrap').getBoundingClientRect();
            enfChart.setSize({ width: r.width, height: r.height });
        }
        if (detChart) {
            const r = el('chart-detection-wrap').getBoundingClientRect();
            detChart.setSize({ width: r.width, height: r.height });
        }
    }
    window.addEventListener('resize', onResize);

    // =========================================================================
    // Init
    // =========================================================================
    initEnfChart();
    initDetChart();
    connectSSE();
    fetchRules();
    </script>
</body>
</html>
